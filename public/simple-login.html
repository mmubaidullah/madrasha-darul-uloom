<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাদরাসা ব্যবস্থাপনা সিস্টেম - লগইন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-lg shadow-md">
        <div class="text-center">
            <div class="mx-auto h-20 w-20 flex items-center justify-center rounded-full bg-green-100 mb-4">
                <img src="/images/Madrasha-Logo.jpeg" alt="মাদরাসা লোগো" class="w-16 h-16 rounded-full object-cover">
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900">
                মাদরাসা ব্যবস্থাপনা সিস্টেম
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                আপনার অ্যাকাউন্টে লগইন করুন
            </p>
        </div>
        
        <form class="mt-8 space-y-6" onsubmit="handleLogin(event)">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        ইমেইল ঠিকানা
                    </label>
                    <input
                        id="email"
                        type="email"
                        class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-green-500 focus:border-green-500 sm:text-sm"
                        placeholder="admin@example.com"
                        value="admin@example.com"
                        required
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        পাসওয়ার্ড
                    </label>
                    <input
                        id="password"
                        type="password"
                        class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-green-500 focus:border-green-500 sm:text-sm"
                        placeholder="আপনার পাসওয়ার্ড"
                        value="123456"
                        required
                    />
                </div>
            </div>

            <div>
                <button
                    type="submit"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500"
                >
                    লগইন করুন
                </button>
            </div>

            <div class="text-center space-y-2">
                <p class="text-sm text-gray-600">
                    ডেমো লগইন: যেকোনো ইমেইল এবং পাসওয়ার্ড ব্যবহার করুন
                </p>
                
                <div class="flex gap-2 justify-center">
                    <button
                        type="button"
                        onclick="clearStorage()"
                        class="text-xs text-red-600 hover:text-red-700 px-2 py-1 border border-red-200 rounded"
                    >
                        Clear Storage
                    </button>
                    
                    <button
                        type="button"
                        onclick="goToAdmin()"
                        class="text-xs text-blue-600 hover:text-blue-700 px-2 py-1 border border-blue-200 rounded"
                    >
                        Direct Admin
                    </button>
                    
                    <button
                        type="button"
                        onclick="startServer()"
                        class="text-xs text-purple-600 hover:text-purple-700 px-2 py-1 border border-purple-200 rounded"
                    >
                        Start Server
                    </button>
                </div>
            </div>
        </form>
    </div>

    <script>
        function handleLogin(event) {
            event.preventDefault();
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            if (email && password) {
                // Store auth data
                const mockUser = {
                    id: 1,
                    name: 'প্রশাসক',
                    email: email,
                    role: 'admin'
                };
                
                const mockToken = 'demo-jwt-token-' + Date.now();
                
                localStorage.setItem('auth_token', JSON.stringify(mockToken));
                localStorage.setItem('user_data', JSON.stringify(mockUser));
                
                alert('লগইন সফল! Admin panel এ যাচ্ছি...');
                
                // Try to go to admin panel
                window.location.href = 'http://localhost:3000/admin';
            } else {
                alert('ইমেইল এবং পাসওয়ার্ড দিন');
            }
        }
        
        function clearStorage() {
            localStorage.clear();
            alert('Storage cleared!');
            location.reload();
        }
        
        function goToAdmin() {
            window.location.href = 'http://localhost:3000/admin';
        }
        
        function startServer() {
            alert('Terminal এ গিয়ে "npm run dev" কমান্ড চালান');
        }
        
        // Check if already logged in
        window.onload = function() {
            const token = localStorage.getItem('auth_token');
            const user = localStorage.getItem('user_data');
            
            if (token && user) {
                const userObj = JSON.parse(user);
                document.querySelector('h2').innerHTML += '<br><small class="text-green-600">Already logged in as: ' + userObj.name + '</small>';
            }
        }
    </script>
</body>
</html>
