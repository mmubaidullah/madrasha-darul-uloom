<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Test Page</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gray-100 p-8">
    <div class="max-w-2xl mx-auto bg-white rounded-lg shadow-md p-6">
        <h1 class="text-3xl font-bold mb-6 text-center">System Test Page</h1>
        
        <div class="space-y-4">
            <div class="bg-gray-50 p-4 rounded">
                <h3 class="font-semibold mb-2">Available Pages:</h3>
                <div class="space-y-2">
                    <a href="/working-login.html" class="block text-blue-600 hover:underline">
                        → Working Login (HTML) - সবচেয়ে ভালো
                    </a>
                    <a href="http://localhost:3000/simple-admin" class="block text-blue-600 hover:underline">
                        → Simple Admin Panel
                    </a>
                    <a href="http://localhost:3000/admin" class="block text-blue-600 hover:underline">
                        → Full Admin Panel
                    </a>
                </div>
            </div>
            
            <div class="bg-yellow-50 p-4 rounded">
                <h3 class="font-semibold mb-2">Quick Actions:</h3>
                <div class="space-y-2">
                    <button onclick="testLogin()" class="w-full bg-green-600 text-white p-2 rounded hover:bg-green-700">
                        Test Login (Store Auth Data)
                    </button>
                    <button onclick="clearAuth()" class="w-full bg-red-600 text-white p-2 rounded hover:bg-red-700">
                        Clear Auth Data
                    </button>
                    <button onclick="checkAuth()" class="w-full bg-blue-600 text-white p-2 rounded hover:bg-blue-700">
                        Check Auth Status
                    </button>
                </div>
            </div>
            
            <div id="status" class="bg-gray-50 p-4 rounded">
                <h3 class="font-semibold mb-2">Status:</h3>
                <div id="statusContent">Ready...</div>
            </div>
        </div>
    </div>

    <script>
        function updateStatus(message, color = 'text-gray-700') {
            document.getElementById('statusContent').innerHTML = 
                '<div class="' + color + '">' + message + '</div>';
        }
        
        function testLogin() {
            try {
                const mockUser = {
                    id: 1,
                    name: 'প্রশাসক',
                    email: 'admin@example.com',
                    role: 'admin'
                };
                
                const mockToken = 'demo-jwt-token-' + Date.now();
                
                localStorage.setItem('auth_token', JSON.stringify(mockToken));
                localStorage.setItem('user_data', JSON.stringify(mockUser));
                
                updateStatus('✅ Login data stored successfully!', 'text-green-600');
                
                setTimeout(() => {
                    updateStatus('Redirecting to admin panel...', 'text-blue-600');
                    window.location.href = 'http://localhost:3000/simple-admin';
                }, 1500);
                
            } catch (error) {
                updateStatus('❌ Error: ' + error.message, 'text-red-600');
            }
        }
        
        function clearAuth() {
            localStorage.clear();
            updateStatus('🗑️ Auth data cleared!', 'text-yellow-600');
        }
        
        function checkAuth() {
            const token = localStorage.getItem('auth_token');
            const user = localStorage.getItem('user_data');
            
            if (token && user) {
                const userObj = JSON.parse(user);
                updateStatus('✅ Logged in as: ' + userObj.name + ' (' + userObj.email + ')', 'text-green-600');
            } else {
                updateStatus('❌ Not logged in', 'text-red-600');
            }
        }
        
        // Check auth on load
        window.onload = function() {
            checkAuth();
        }
    </script>
</body>
</html>
