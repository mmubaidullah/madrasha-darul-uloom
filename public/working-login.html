<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>মাদরাসা ব্যবস্থাপনা সিস্টেম - লগইন</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
    </style>
</head>
<body class="min-h-screen flex items-center justify-center bg-gray-50">
    <div class="max-w-md w-full space-y-8 bg-white p-8 rounded-lg shadow-md">
        <div class="text-center">
            <div class="mx-auto h-20 w-20 flex items-center justify-center rounded-full bg-green-100 mb-4">
                <div class="w-16 h-16 bg-green-600 rounded-full flex items-center justify-center text-white text-2xl font-bold">
                    M
                </div>
            </div>
            <h2 class="text-3xl font-extrabold text-gray-900">
                মাদরাসা ব্যবস্থাপনা সিস্টেম
            </h2>
            <p class="mt-2 text-sm text-gray-600">
                আপনার অ্যাকাউন্টে লগইন করুন
            </p>
        </div>
        
        <div class="mt-8 space-y-6">
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        ইমেইল ঠিকানা
                    </label>
                    <input
                        id="email"
                        type="email"
                        class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-green-500 focus:border-green-500 sm:text-sm"
                        placeholder="admin@example.com"
                        value="admin@example.com"
                    />
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">
                        পাসওয়ার্ড
                    </label>
                    <input
                        id="password"
                        type="password"
                        class="mt-1 appearance-none relative block w-full px-3 py-2 border border-gray-300 placeholder-gray-500 text-gray-900 rounded-md focus:outline-none focus:ring-green-500 focus:border-green-500 sm:text-sm"
                        placeholder="আপনার পাসওয়ার্ড"
                        value="123456"
                    />
                </div>
            </div>

            <div>
                <button
                    id="loginBtn"
                    type="button"
                    onclick="doLogin()"
                    class="group relative w-full flex justify-center py-2 px-4 border border-transparent text-sm font-medium rounded-md text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500"
                >
                    <span id="loginText">লগইন করুন</span>
                </button>
            </div>

            <div class="text-center space-y-4">
                <p class="text-sm text-gray-600">
                    ডেমো লগইন: যেকোনো ইমেইল এবং পাসওয়ার্ড ব্যবহার করুন
                </p>
                
                <div class="space-y-2">
                    <button
                        type="button"
                        onclick="clearStorage()"
                        class="w-full text-xs text-red-600 hover:text-red-700 px-2 py-1 border border-red-200 rounded"
                    >
                        Clear Storage & Refresh
                    </button>
                    
                    <button
                        type="button"
                        onclick="checkAuth()"
                        class="w-full text-xs text-blue-600 hover:text-blue-700 px-2 py-1 border border-blue-200 rounded"
                    >
                        Check Auth Status
                    </button>
                    
                    <button
                        type="button"
                        onclick="openAdmin()"
                        class="w-full text-xs text-purple-600 hover:text-purple-700 px-2 py-1 border border-purple-200 rounded"
                    >
                        Open Admin (New Tab)
                    </button>
                </div>
            </div>
            
            <div id="status" class="text-center text-sm"></div>
        </div>
    </div>

    <script>
        let isLoggingIn = false;
        
        function doLogin() {
            if (isLoggingIn) {
                console.log('Already logging in, please wait...');
                return;
            }
            
            isLoggingIn = true;
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            const status = document.getElementById('status');
            
            // Update UI
            loginBtn.disabled = true;
            loginBtn.classList.add('opacity-50', 'cursor-not-allowed');
            loginText.innerHTML = 'লগইন হচ্ছে...';
            status.innerHTML = '<div class="text-blue-600">Processing login...</div>';
            
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            
            console.log('Login attempt:', { email, password });
            
            if (!email || !password) {
                status.innerHTML = '<div class="text-red-600">ইমেইল এবং পাসওয়ার্ড দিন</div>';
                resetLoginButton();
                return;
            }
            
            try {
                // Store auth data
                const mockUser = {
                    id: 1,
                    name: 'প্রশাসক',
                    email: email,
                    role: 'admin'
                };
                
                const mockToken = 'demo-jwt-token-' + Date.now();
                
                console.log('Storing auth data:', { mockUser, mockToken });
                
                localStorage.setItem('auth_token', JSON.stringify(mockToken));
                localStorage.setItem('user_data', JSON.stringify(mockUser));
                
                status.innerHTML = '<div class="text-green-600">✓ লগইন সফল! Redirecting...</div>';
                
                // Wait a moment then redirect
                setTimeout(() => {
                    console.log('Redirecting to admin...');
                    window.location.href = 'http://localhost:3000/admin';
                }, 1500);
                
            } catch (error) {
                console.error('Login error:', error);
                status.innerHTML = '<div class="text-red-600">লগইন করতে সমস্যা হয়েছে: ' + error.message + '</div>';
                resetLoginButton();
            }
        }
        
        function resetLoginButton() {
            isLoggingIn = false;
            const loginBtn = document.getElementById('loginBtn');
            const loginText = document.getElementById('loginText');
            
            loginBtn.disabled = false;
            loginBtn.classList.remove('opacity-50', 'cursor-not-allowed');
            loginText.innerHTML = 'লগইন করুন';
        }
        
        function clearStorage() {
            localStorage.clear();
            document.getElementById('status').innerHTML = '<div class="text-yellow-600">Storage cleared!</div>';
            setTimeout(() => {
                location.reload();
            }, 1000);
        }
        
        function checkAuth() {
            const token = localStorage.getItem('auth_token');
            const user = localStorage.getItem('user_data');
            const status = document.getElementById('status');
            
            if (token && user) {
                const userObj = JSON.parse(user);
                status.innerHTML = '<div class="text-green-600">✓ Logged in as: ' + userObj.name + '</div>';
            } else {
                status.innerHTML = '<div class="text-red-600">✗ Not logged in</div>';
            }
        }
        
        function openAdmin() {
            window.open('http://localhost:3000/admin', '_blank');
        }
        
        // Check auth status on load
        window.onload = function() {
            console.log('Page loaded');
            checkAuth();
            
            // Prevent form submission
            const form = document.querySelector('form');
            if (form) {
                form.addEventListener('submit', function(e) {
                    e.preventDefault();
                    console.log('Form submission prevented');
                });
            }
        }
        
        // Prevent Enter key from causing issues
        document.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                e.preventDefault();
                doLogin();
            }
        });
    </script>
</body>
</html>
